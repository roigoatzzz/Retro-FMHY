<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FMHY API | Modern Frontend</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        /* --- Color Palette & Variables --- */
        :root {
            --bg-base: #000000;
            --bg-surface: #111111;
            --bg-surface-hover: #222222;
            --text-primary: #00ff00;
            --text-secondary: #00cc00;
            --accent-primary: #00ff00;
            --accent-hover: #ccffcc;
            --border-color: #00ff00;
            --scrollbar-bg: #000000;
            --scrollbar-thumb: #00ff00;
            --highlight-bg: #004400;
            --highlight-text: #ffffff;
        }

        [data-theme="light"] {
            --bg-base: #ffffff;
            --bg-surface: #f0f0f0;
            --bg-surface-hover: #e0e0e0;
            --text-primary: #000000;
            --text-secondary: #333333;
            --accent-primary: #0000cc;
            --accent-hover: #0000ff;
            --border-color: #000000;
            --scrollbar-bg: #ffffff;
            --scrollbar-thumb: #666666;
            --highlight-bg: #ffff00;
            --highlight-text: #000000;
        }

        [data-theme="cyberpunk"] {
            --bg-base: #0b0014;
            --bg-surface: #18002b;
            --bg-surface-hover: #240040;
            --text-primary: #ff00ff;
            --text-secondary: #00ffff;
            --accent-primary: #ffee00;
            --accent-hover: #ffffff;
            --border-color: #00ffff;
            --scrollbar-bg: #0b0014;
            --scrollbar-thumb: #ff00ff;
            --highlight-bg: #ff0099;
            --highlight-text: #ffffff;
        }

        [data-theme="monochrome"] {
            --bg-base: #0a0a0a;
            --bg-surface: #1a1a1a;
            --bg-surface-hover: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #999999;
            --accent-primary: #ffffff;
            --accent-hover: #cccccc;
            --border-color: #333333;
            --scrollbar-bg: #0a0a0a;
            --scrollbar-thumb: #666666;
            --highlight-bg: #ffffff;
            --highlight-text: #000000;
        }

        [data-theme="catppuccin"] {
            --bg-base: #1e1e2e;
            --bg-surface: #313244;
            --bg-surface-hover: #45475a;
            --text-primary: #cdd6f4;
            --text-secondary: #a6adc8;
            --accent-primary: #89b4fa;
            --accent-hover: #b4befe;
            --border-color: #45475a;
            --scrollbar-bg: #1e1e2e;
            --scrollbar-thumb: #585b70;
            --highlight-bg: #f9e2af;
            --highlight-text: #1e1e2e;
        }

        [data-theme="nord"] {
            --bg-base: #2e3440;
            --bg-surface: #3b4252;
            --bg-surface-hover: #434c5e;
            --text-primary: #eceff4;
            --text-secondary: #d8dee9;
            --accent-primary: #88c0d0;
            --accent-hover: #81a1c1;
            --border-color: #4c566a;
            --scrollbar-bg: #2e3440;
            --scrollbar-thumb: #4c566a;
            --highlight-bg: #ebcb8b;
            --highlight-text: #2e3440;
        }

        [data-theme="gruvbox"] {
            --bg-base: #282828;
            --bg-surface: #3c3836;
            --bg-surface-hover: #504945;
            --text-primary: #ebdbb2;
            --text-secondary: #a89984;
            --accent-primary: #fabd2f;
            --accent-hover: #fe8019;
            --border-color: #504945;
            --scrollbar-bg: #282828;
            --scrollbar-thumb: #928374;
            --highlight-bg: #fabd2f;
            --highlight-text: #282828;
        }

        [data-theme="everforest"] {
            --bg-base: #2b3339;
            --bg-surface: #323c41;
            --bg-surface-hover: #414b50;
            --text-primary: #d3c6aa;
            --text-secondary: #9da9a0;
            --accent-primary: #a7c080;
            --accent-hover: #d699b6;
            --border-color: #4a555b;
            --scrollbar-bg: #2b3339;
            --scrollbar-thumb: #7fbbb3;
            --highlight-bg: #a7c080;
            --highlight-text: #2b3339;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-base);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
            font-size: 15px;
            line-height: 1.4;
        }

        /* --- Sidebar Navigation --- */
        aside {
            width: 320px;
            background: var(--bg-base);
            border-right: 2px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100%;
            flex-shrink: 0;
            position: relative;
        }

        .brand {
            padding: 24px;
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid var(--border-color);
            cursor: pointer;
        }

        .brand::after {
            content: '█';
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .theme-selector {
            padding: 16px;
            border-bottom: 2px solid var(--border-color);
        }

        #themeSelect {
            width: 100%;
            padding: 8px;
            background: var(--bg-base);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            font-family: 'Courier New', Courier, monospace;
            outline: none;
        }

        .search-container {
            padding: 16px;
            border-bottom: 2px solid var(--border-color);
            position: relative;
        }

        #searchInput {
            width: 100%;
            padding: 12px 16px;
            border-radius: 0;
            border: 1px solid var(--border-color);
            background-color: var(--bg-base);
            color: var(--text-primary);
            outline: none;
            font-size: 0.9rem;
            font-family: 'Courier New', Courier, monospace;
            padding-right: 40px;
        }

        #searchInput:focus {
            background-color: var(--bg-surface-hover);
            box-shadow: none;
        }

        #clearSearch {
            position: absolute;
            right: 28px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            font-weight: bold;
            cursor: pointer;
            font-size: 1.2rem;
            font-family: 'Courier New', Courier, monospace;
        }
        #clearSearch:hover {
            color: var(--accent-primary);
        }

        .nav-links {
            flex: 1;
            overflow-y: auto;
            padding: 16px 0;
        }

        .nav-links ul {
            list-style: none;
        }

        .nav-links li a {
            display: block;
            padding: 10px 16px;
            margin: 0;
            border-radius: 0;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border-left: 4px solid transparent;
        }

        .nav-links li a:hover {
            background-color: var(--text-primary);
            color: var(--bg-base);
            border-left: 4px solid var(--text-primary);
        }

        /* Accordion Menu Styles */
        .nav-links .category-toggle {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            font-weight: bold;
            color: var(--text-primary);
        }

        .nav-links .toggle-icon {
            font-family: monospace;
            font-size: 1rem;
        }

        .nav-links .subcategory-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .nav-links .subcategory-list.open {
            max-height: 1500px; /* Arbitrary large value to allow expansion */
        }

        .nav-links .subcategory-list a {
            padding-left: 30px;
            font-size: 0.85rem;
            opacity: 0.8;
        }

        /* Sidebar Resizer */
        .resizer {
            width: 8px;
            height: 100%;
            position: absolute;
            right: -4px;
            top: 0;
            cursor: col-resize;
            z-index: 100;
        }
        .resizer:hover { background: rgba(0, 255, 0, 0.2); }

        /* --- Mobile Sidebar & Menu --- */
        .menu-btn {
            display: none;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0 16px 0 0;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 900;
            backdrop-filter: blur(2px);
        }

        @media (max-width: 768px) {
            .resizer { display: none; }
            aside {
                position: fixed;
                z-index: 1000;
                left: -320px;
                transition: left 0.3s ease;
                box-shadow: 4px 0 0 var(--border-color);
            }
            aside.open { left: 0; }
            .menu-btn { display: block; }
            .sidebar-overlay.active { display: block; }
        }

        /* --- Main Content Area --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-base);
        }

        header {
            background-color: var(--bg-base);
            padding: 24px 40px;
            border-bottom: 2px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 77px;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        header h2 {
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            color: var(--text-primary);
        }

        .status-badge {
            background-color: var(--bg-base);
            color: var(--text-primary);
            padding: 4px 12px;
            border-radius: 0;
            font-size: 0.75rem;
            font-weight: bold;
            border: 1px solid var(--border-color);
            text-transform: uppercase;
        }

        .content-area {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .content-container {
            max-width: 850px;
            margin: 0 auto;
        }

        /* --- Scraped Content Styling (Markdown Rendered) --- */
        .content-container h1 {
            font-size: 2.5rem;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 32px;
            border-bottom: 4px double var(--border-color);
            display: inline-block;
        }

        .content-container h2 {
            font-size: 1.5rem;
            margin-top: 48px;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: none;
            color: var(--text-primary);
        }
        
        .content-container h3 {
            font-size: 1.2rem;
            margin-top: 24px;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .content-container p {
            margin-bottom: 16px;
            color: var(--text-secondary);
        }

        .content-container a {
            color: var(--accent-primary);
            text-decoration: none;
            border-bottom: 1px solid var(--accent-primary);
        }

        .content-container a:hover {
            background-color: var(--accent-primary);
            color: var(--bg-base);
            text-decoration: none;
        }

        .content-container ul, .content-container ol {
            padding-left: 24px;
            margin-bottom: 24px;
            color: var(--text-secondary);
        }

        .content-container li {
            margin-bottom: 8px;
        }

        .content-container code {
            background-color: var(--bg-surface);
            padding: 2px 6px;
            border-radius: 0;
            font-family: monospace;
            font-size: 0.85em;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .content-container pre {
            background-color: var(--bg-surface);
            padding: 16px;
            border-radius: 0;
            overflow-x: auto;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
            box-shadow: none;
        }

        .content-container blockquote {
            border-left: 4px solid var(--border-color);
            background: var(--bg-surface);
            padding: 16px 24px;
            border-radius: 0;
            margin: 24px 0;
            font-style: italic;
            color: var(--text-secondary);
        }

        .content-container table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin: 24px 0;
            border: 1px solid var(--border-color);
            border-radius: 0;
            overflow: hidden;
        }
        .content-container th {
            background-color: var(--bg-surface);
            font-weight: 600;
            text-align: left;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        .content-container td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
        }
        .content-container tr:last-child td {
            border-bottom: none;
        }

        .content-container hr {
            border: 0;
            border-bottom: 1px solid var(--border-color);
            margin: 32px 0;
        }

        mark.search-highlight {
            background-color: var(--highlight-bg);
            color: var(--highlight-text);
        }

        /* Back to Top Button */
        #backToTop {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--bg-base);
            color: var(--text-primary);
            border: 2px solid var(--text-primary);
            padding: 10px 15px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            cursor: pointer;
            display: none; /* Hidden by default */
            z-index: 100;
            box-shadow: 4px 4px 0px var(--text-primary);
        }
        #backToTop:hover {
            background-color: var(--text-primary);
            color: var(--bg-base);
            box-shadow: 2px 2px 0px var(--text-primary);
            transform: translate(2px, 2px);
        }

        /* Search Filter Utility */
        .hidden {
            display: none !important;
        }

        /* State Modifiers */
        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 50vh;
            color: var(--text-secondary);
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-color);
            border-top-color: transparent;
            border-radius: 0;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- Scrollbars --- */
        ::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }
        ::-webkit-scrollbar-track {
            background: var(--scrollbar-bg);
            border-left: 1px solid var(--border-color);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border: 1px solid var(--bg-base);
            border-radius: 0;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-hover);
        }
    </style>
</head>
<body>
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <aside>
        <div class="brand" id="brandText" onclick="scrollToTop()">
        </div>
        <div class="theme-selector">
            <select id="themeSelect" onchange="setTheme(this.value)">
                <option value="retro">Retro (Default)</option>
                <option value="light">Light Mode</option>
                <option value="cyberpunk">Cyberpunk</option>
                <option value="monochrome">Monochrome</option>
                <option value="catppuccin">Catppuccin</option>
                <option value="nord">Nord</option>
                <option value="gruvbox">Gruvbox</option>
                <option value="everforest">Everforest</option>
            </select>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search resources, links, tags...">
            <button id="clearSearch" class="hidden" title="Clear Search">X</button>
        </div>
        <div class="nav-links" id="toc">
            </div>
        <div id="sidebarResizer" class="resizer"></div>
    </aside>

    <main>
        <header>
            <button class="menu-btn" onclick="toggleSidebar()">[MENU]</button>
            <h2 id="current-section">Directory Overview</h2>
            <div class="status-badge" id="statusBadge">Connecting...</div>
        </header>
        
        <div class="content-area" id="mainScroll">
            <div class="content-container" id="content">
                <div class="loader">
                    <div class="spinner"></div>
                    <div id="loadingText">Fetching real-time data from API...</div>
                </div>
            </div>
            <button id="backToTop" onclick="scrollToTop()">^ TOP</button>
        </div>
    </main>

    <script>
        // Settings
        const API_URL = 'https://api.fmhy.net/single-page';

        async function initializeApp() {
            const contentDiv = document.getElementById('content');
            const statusBadge = document.getElementById('statusBadge');
            const loadingText = document.getElementById('loadingText');

            try {
                // 1. Fetch raw markdown
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const rawMarkdown = await response.text();
                
                // 2. Parse Markdown to HTML
                statusBadge.innerText = 'Parsing...';
                contentDiv.innerHTML = marked.parse(rawMarkdown);
                
                // 3. Post-process
                buildSidebarNavigation();
                initializeSearchEngine();
                initializeBackToTop();
                typeWriterEffect();
                initializeScrollSpy();
                initializeResizer();
                loadSavedTheme();
                
                statusBadge.innerText = 'ONLINE';
                statusBadge.style.color = '#00ff00';

            } catch (error) {
                loadingText.innerHTML = `
                    <span style="color: #ef4444;">Connection Failed</span><br>
                    <small style="margin-top: 8px; display: inline-block;">Failed to fetch from ${API_URL}. Cross-Origin Resource Sharing (CORS) might be blocking the browser request.</small>
                `;
                document.querySelector('.spinner').style.display = 'none';
                statusBadge.innerText = 'Disconnected';
                statusBadge.style.color = '#ef4444';
                statusBadge.style.backgroundColor = 'transparent';
                statusBadge.style.borderColor = '#ef4444';
                console.error('Fetch Error:', error);
            }
        }

        // Typewriter Effect
        function typeWriterEffect() {
            const text = "[ FMHY Scraper ]";
            const el = document.getElementById('brandText');
            el.innerText = "";
            let i = 0;
            function type() {
                if (i < text.length) {
                    el.innerText += text.charAt(i);
                    i++;
                    setTimeout(type, 100);
                }
            }
            type();
        }

        // Mobile Sidebar Toggle
        function toggleSidebar() {
            document.querySelector('aside').classList.toggle('open');
            document.querySelector('.sidebar-overlay').classList.toggle('active');
        }

        // Theme Switcher
        function setTheme(themeName) {
            localStorage.setItem('theme', themeName);
            if (themeName === 'retro') {
                document.documentElement.removeAttribute('data-theme');
            } else {
                document.documentElement.setAttribute('data-theme', themeName);
            }
        }

        function loadSavedTheme() {
            const savedTheme = localStorage.getItem('theme') || 'retro';
            const select = document.getElementById('themeSelect');
            select.value = savedTheme;
            setTheme(savedTheme);
        }

        // Build Table of Contents based on H1 and H2 tags scraped from the payload
        function buildSidebarNavigation() {
            const content = document.getElementById('content');
            const headings = content.querySelectorAll('h1, h2');
            const tocContainer = document.getElementById('toc');
            tocContainer.innerHTML = ''; // Clear previous content
            const mainUl = document.createElement('ul');
            
            let currentSublist = null;

            headings.forEach((heading, index) => {
                // Create unique ID for smooth scrolling anchors
                if (!heading.id) {
                    heading.id = 'section-' + index;
                }
                
                // Clean up title format
                let titleText = heading.innerText.replace(/[^a-zA-Z0-9\s]/g, '').trim();
                if(titleText.length === 0) titleText = "Section " + index;
                
                if (heading.tagName.toLowerCase() === 'h1') {
                    const categoryLi = document.createElement('li');
                    
                    const categoryLink = document.createElement('a');
                    categoryLink.href = '#'; // Prevent page jump
                    categoryLink.classList.add('category-toggle');
                    categoryLink.innerHTML = `<span>${titleText}</span><span class="toggle-icon">[+]</span>`;

                    currentSublist = document.createElement('ul');
                    currentSublist.classList.add('subcategory-list');
                    
                    // Capture the sublist for this closure
                    const thisSublist = currentSublist;

                    categoryLink.addEventListener('click', (e) => {
                        e.preventDefault();
                        
                        // Close all other open lists
                        const allOpenLists = tocContainer.querySelectorAll('.subcategory-list.open');
                        allOpenLists.forEach(list => {
                            if (list !== thisSublist) {
                                list.classList.remove('open');
                                // Reset icon
                                const prevLink = list.previousElementSibling;
                                if (prevLink) {
                                    const icon = prevLink.querySelector('.toggle-icon');
                                    if (icon) icon.textContent = '[+]';
                                }
                            }
                        });

                        const isOpen = thisSublist.classList.toggle('open');
                        const icon = categoryLink.querySelector('.toggle-icon');
                        icon.textContent = isOpen ? '[-]' : '[+]';
                    });

                    categoryLi.appendChild(categoryLink);
                    categoryLi.appendChild(currentSublist);
                    mainUl.appendChild(categoryLi);

                } else if (heading.tagName.toLowerCase() === 'h2' && currentSublist) {
                    const subcategoryLi = document.createElement('li');
                    const subcategoryLink = document.createElement('a');
                    subcategoryLink.href = '#' + heading.id;
                    subcategoryLink.textContent = titleText;

                    subcategoryLink.addEventListener('click', (e) => {
                        e.preventDefault();
                        heading.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        document.getElementById('current-section').innerText = titleText;
                        if(window.innerWidth <= 768) toggleSidebar();
                    });
                    
                    subcategoryLi.appendChild(subcategoryLink);
                    currentSublist.appendChild(subcategoryLi);
                }
            });
            
            tocContainer.appendChild(mainUl);
        }

        // Scroll Spy (Updates Header with Current Section)
        function initializeScrollSpy() {
            const mainScroll = document.getElementById('mainScroll');
            const label = document.getElementById('current-section');
            
            mainScroll.addEventListener('scroll', () => {
                const headers = document.querySelectorAll('.content-container h1, .content-container h2');
                let current = '';
                
                headers.forEach(header => {
                    const rect = header.getBoundingClientRect();
                    // Check if header is near the top (150px offset)
                    if (rect.top < 150) {
                        current = header.innerText;
                    }
                });

                if (current) {
                    label.innerText = current.replace(/[^a-zA-Z0-9\s]/g, '').trim();
                }
            });
        }

        // Debounce Utility
        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                const context = this;
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(context, args), wait);
            };
        }

        // Client-side DOM Search Scraper
        function initializeSearchEngine() {
            const searchInput = document.getElementById('searchInput');
            const clearBtn = document.getElementById('clearSearch');
            const content = document.getElementById('content');
            const toc = document.getElementById('toc');
            
            // Clear Button Logic
            clearBtn.addEventListener('click', () => {
                searchInput.value = '';
                clearBtn.classList.add('hidden');
                removeHighlights();
                
                const allElements = content.querySelectorAll('p, li, h1, h2, h3, h4, blockquote, table, hr');
                const lists = content.querySelectorAll('ul, ol');
                allElements.forEach(el => el.classList.remove('hidden'));
                lists.forEach(el => el.classList.remove('hidden'));

                // Reset Sidebar
                const mainUl = toc.querySelector('ul');
                if (mainUl) {
                    Array.from(mainUl.children).forEach(cat => {
                        cat.style.display = '';
                        const subList = cat.querySelector('.subcategory-list');
                        if (subList) {
                            subList.classList.remove('open');
                            const icon = cat.querySelector('.toggle-icon');
                            if(icon) icon.textContent = '[+]';
                            subList.querySelectorAll('li').forEach(li => li.style.display = '');
                        }
                    });
                }
            });

            // Search Logic
            const performSearch = debounce((term) => {
                removeHighlights();
                
                // Elements to manage visibility for
                const allElements = content.querySelectorAll('p, li, h1, h2, h3, h4, blockquote, table, hr');
                const lists = content.querySelectorAll('ul, ol');
                
                // Sidebar elements
                const mainUl = toc.querySelector('ul');
                const sidebarCategories = mainUl ? Array.from(mainUl.children) : [];

                if (!term) {
                    allElements.forEach(el => el.classList.remove('hidden'));
                    lists.forEach(el => el.classList.remove('hidden'));
                    
                    // Reset Sidebar
                    sidebarCategories.forEach(cat => {
                        cat.style.display = '';
                        const subList = cat.querySelector('.subcategory-list');
                        if (subList) {
                            subList.classList.remove('open');
                            const icon = cat.querySelector('.toggle-icon');
                            if(icon) icon.textContent = '[+]';
                            subList.querySelectorAll('li').forEach(li => li.style.display = '');
                        }
                    });
                    return;
                }

                // 1. Hide everything initially
                allElements.forEach(el => el.classList.add('hidden'));
                lists.forEach(el => el.classList.add('hidden'));

                // 2. Find matches and reveal context
                allElements.forEach(el => {
                    // Use textContent for better performance than innerText
                    const textContent = el.textContent.toLowerCase();
                    if (textContent.includes(term)) {
                        el.classList.remove('hidden');
                        highlightTextInElement(el, term);
                        
                        // Reveal Context: Parent List
                        if (el.tagName === 'LI') {
                            const parent = el.closest('ul, ol');
                            if (parent) parent.classList.remove('hidden');
                        }

                        // Reveal Context: Previous Header
                        let prev = el.tagName === 'LI' ? el.closest('ul, ol')?.previousElementSibling : el.previousElementSibling;
                        
                        while (prev) {
                            if (['H1','H2','H3'].includes(prev.tagName)) {
                                prev.classList.remove('hidden');
                                break;
                            }
                            prev = prev.previousElementSibling;
                        }
                    } else {
                        // Already hidden by step 1
                    }
                });

                // Sidebar Filtering
                sidebarCategories.forEach(cat => {
                    const link = cat.querySelector('.category-toggle');
                    if (!link) return;
                    
                    const titleSpan = link.querySelector('span:first-child');
                    const catText = titleSpan ? titleSpan.textContent.toLowerCase() : link.textContent.toLowerCase();
                    
                    const subList = cat.querySelector('.subcategory-list');
                    const subItems = subList ? subList.querySelectorAll('li') : [];
                    
                    let hasSubMatch = false;
                    const catMatch = catText.includes(term);
                    
                    subItems.forEach(item => {
                        const itemLink = item.querySelector('a');
                        const itemText = itemLink.textContent.toLowerCase();
                        
                        if (itemText.includes(term) || catMatch) {
                            item.style.display = '';
                            if (itemText.includes(term)) hasSubMatch = true;
                        } else {
                            item.style.display = 'none';
                        }
                    });
                    
                    if (catMatch || hasSubMatch) {
                        cat.style.display = '';
                        if (subList) {
                            subList.classList.add('open');
                            const icon = cat.querySelector('.toggle-icon');
                            if(icon) icon.textContent = '[-]';
                        }
                    } else {
                        cat.style.display = 'none';
                    }
                });

            }, 300);

            // Input Listener
            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase().trim();
                if (term) clearBtn.classList.remove('hidden');
                else clearBtn.classList.add('hidden');
                
                performSearch(term);
            });
        }

        // Sidebar Resizer Logic
        function initializeResizer() {
            const sidebar = document.querySelector('aside');
            const resizer = document.getElementById('sidebarResizer');
            let isResizing = false;

            // Load saved width
            const savedWidth = localStorage.getItem('sidebarWidth');
            if (savedWidth) {
                sidebar.style.width = `${savedWidth}px`;
            }

            resizer.addEventListener('mousedown', (e) => {
                isResizing = true;
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none'; // Prevent text selection
            });

            document.addEventListener('mousemove', (e) => {
                if (!isResizing) return;
                
                // Constraints
                let newWidth = e.clientX;
                if (newWidth < 200) newWidth = 200;
                if (newWidth > 600) newWidth = 600;
                
                sidebar.style.width = `${newWidth}px`;
            });

            document.addEventListener('mouseup', () => {
                if (isResizing && sidebar.style.width) {
                    localStorage.setItem('sidebarWidth', parseInt(sidebar.style.width));
                }
                isResizing = false;
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
            });
        }

        // Highlight Utility
        function highlightTextInElement(element, term) {
            const walker = document.createTreeWalker(element, NodeFilter.SHOW_TEXT, null, false);
            const nodes = [];
            while(walker.nextNode()) {
                if (!walker.currentNode.parentElement.classList.contains('highlight-wrapper')) {
                    nodes.push(walker.currentNode);
                }
            }

            nodes.forEach(node => {
                if (node.nodeValue.toLowerCase().includes(term)) {
                    const escapedText = node.nodeValue.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                    const highlightedHTML = escapedText.replace(new RegExp(`(${term})`, 'gi'), '<mark class="search-highlight">$1</mark>');
                    
                    const wrapper = document.createElement('span');
                    wrapper.className = 'highlight-wrapper';
                    wrapper.innerHTML = highlightedHTML;
                    
                    node.parentNode.replaceChild(wrapper, node);
                }
            });
        }

        function removeHighlights() {
            document.querySelectorAll('.highlight-wrapper').forEach(wrapper => {
                const text = document.createTextNode(wrapper.textContent);
                wrapper.parentNode.replaceChild(text, wrapper);
            });
            document.querySelectorAll('mark.search-highlight').forEach(mark => {
                const text = document.createTextNode(mark.textContent);
                mark.parentNode.replaceChild(text, mark);
            });
            document.getElementById('content').normalize();
        }

        // Back to Top Logic
        function initializeBackToTop() {
            const mainScroll = document.getElementById('mainScroll');
            const btn = document.getElementById('backToTop');
            
            mainScroll.addEventListener('scroll', () => {
                if (mainScroll.scrollTop > 300) {
                    btn.style.display = 'block';
                } else {
                    btn.style.display = 'none';
                }
            });
        }

        function scrollToTop() {
            document.getElementById('mainScroll').scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        }

        // Run
        document.addEventListener('DOMContentLoaded', initializeApp);
    </script>
